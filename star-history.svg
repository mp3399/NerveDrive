<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: none; }
      .grid-line { stroke: #334155; stroke-dasharray: 4 4; stroke-width: 0.8; opacity: 0.3; }
      .axis { stroke: #64748b; stroke-width: 1.5; opacity: 0.5; }
      .chart-line { stroke: #10b981; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .chart-area { fill: url(#area-grad); opacity: 0.08; }
      .label-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: #94a3b8; }
      .title-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #f1f5f9; }
      .subtitle-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: #64748b; }
      .glow { filter: url(#glow); }
      @media (prefers-color-scheme: light) {
        .grid-line { stroke: #cbd5e1; opacity: 0.6; }
        .axis { stroke: #94a3b8; opacity: 0.8; }
        .label-text { fill: #475569; }
        .title-text { fill: #0f172a; }
        .subtitle-text { fill: #94a3b8; }
      }
    </style>
    <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Title & Current Count -->
  <text x="60" y="25" class="title-text">mp3399/NerveDrive Star History</text>
  <text x="760" y="25" text-anchor="end" class="subtitle-text">Total Stars: 1</text>

  <!-- Horizontal Grid Lines & Ticks -->
  <line x1="60" y1="340.0" x2="760" y2="340.0" class="grid-line" />
  <text x="50" y="344.0" text-anchor="end" class="label-text">0</text>
  <line x1="60" y1="265.0" x2="760" y2="265.0" class="grid-line" />
  <text x="50" y="269.0" text-anchor="end" class="label-text">1</text>
  <line x1="60" y1="190.0" x2="760" y2="190.0" class="grid-line" />
  <text x="50" y="194.0" text-anchor="end" class="label-text">2</text>
  <line x1="60" y1="115.0" x2="760" y2="115.0" class="grid-line" />
  <text x="50" y="119.0" text-anchor="end" class="label-text">3</text>
  <line x1="60" y1="40.0" x2="760" y2="40.0" class="grid-line" />
  <text x="50" y="44.0" text-anchor="end" class="label-text">4</text>

  <!-- Vertical Grid Lines & Date Labels -->
  <line x1="60.0" y1="40" x2="60.0" y2="340" class="grid-line" />
  <text x="60.0" y="360" text-anchor="middle" class="label-text">Jul 04</text>
  <line x1="235.0" y1="40" x2="235.0" y2="340" class="grid-line" />
  <text x="235.0" y="360" text-anchor="middle" class="label-text">Jul 05</text>
  <line x1="410.0" y1="40" x2="410.0" y2="340" class="grid-line" />
  <text x="410.0" y="360" text-anchor="middle" class="label-text">Jul 07</text>
  <line x1="585.0" y1="40" x2="585.0" y2="340" class="grid-line" />
  <text x="585.0" y="360" text-anchor="middle" class="label-text">Jul 09</text>
  <line x1="760.0" y1="40" x2="760.0" y2="340" class="grid-line" />
  <text x="760.0" y="360" text-anchor="middle" class="label-text">Jul 11</text>

  <!-- Chart area & lines -->
  <path d="M 60.0 340.0 L 60.0 340.0 L 160.0 340.0 L 160.0 265.0 L 160.0 340 L 60.0 340 Z" class="chart-area" />
  <path d="M 60.0 340.0 L 60.0 340.0 L 160.0 340.0 L 160.0 265.0" class="chart-line glow" />
  
  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="340" class="axis" />
  <line x1="60" y1="340" x2="760" y2="340" class="axis" />
</svg>